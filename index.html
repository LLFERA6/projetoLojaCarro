<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>loja de carros</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
<!----<div class="container">-->
        <header class="cabecalho">
            <h3>cadastre seu veiculo para vender mais rapido</h3>
        </header>
        <div class="form-container">
            <div class="form-header">
                <p>Formulário</p>
            </div>
            <div class="form-body">
                <h1 class="form-titulo">Venda facil seu carro</h1>
                <p>Descreva as caracteristicas do seu carro e marque os opcionais que ele precisa</p>
                <form onsubmit="SalvarCarros"(event)>
                   <div class="caixaInputs">
                    <label for="title">Titulo do anuncio <span class="campo-obrigatoria">*</span></label>
                    <input type="text" name="title" id="title" class="block" placeholder="digite um titulo" minlength="1" maxlength="30" required>
                   </div>

                    <div class="caixaInputs">
                    <label for="preco">preço<span class="campo-obrigatoria">*</span></label>
                    <input type="number" name="preco" id="preco" class="block" placeholder="digite Preço $" required>
                   </div>
                     
                   <div class="caixaInputs">
                    <label for="descricao">Descriçâo</label>
                    <textarea name="descricao" id="descricao" class="block" placeholder="Faça a descriçâo do seu veiculo aqui"></textarea>
                   </div>
                   
                    <div class="caixaInputs">
                    <label for="Marca">Marca<span class="campo-obrigatoria">*</span></label>
                    <input type="text" name="marca" id="marca" class="block" placeholder="digite a Marca" required>
                   </div>
                

                <div class="caixaInputs">
                    <label for="Modelo">Modelo<span class="campo-obrigatoria">*</span></label>
                    <input type="text" name="modelo" id="modelo" class="block" placeholder="digite o modelo" required>
                   </div>

                   <div class="caixaInputs">
                    <label for="kilometragem">kilometragem<span class="campo-obrigatoria">*</span></label>
                    <input type="number" name="kilometragem" id="kilometragem" class="block" placeholder="digite o kilometragem" required>
                   </div>

                    <div class="caixaInputs">
                    <label for="data-compra">data da compra<span class="campo-obrigatoria">*</span></label>
                    <input type="date" name="data-compra" id="data-compra" class="block" required> 
                   </div>
                       <div class="caixaInputs">
                        <p>Tipo de cambio: <span class="campo-obrigatorio">*</span></p>
                        <input type="radio" name="marcha" id="manual">
                        <label for="manual">Manual</label> 
                  </div>
                  <div class="caixaopcional">
                    <p>Opcionais</p>
                    <ul class="listaopcionais">
                        <li>
                            <input type="checkbox" name="opcional[]" id="airbag" value="airbag">
                            <label for="airbag">Airbag</label>

                        </li>
                        <li>
                            <input type="checkbox" name="opcional[]" id="arcodicionado" value="arcondicionado">
                            <label for="arcondicionado">Ar condicionado</label>
                        </li>
                        <li>
                            <input type="checkbox" name="opcional[]" id="camerare" value="camerare">
                            <label for="camerare">Camera de Ré</label>
                        </li>
                        <li>
                            <input type="checkbox" name="opcional[]" id="alarme" value="alarme">
                            <label for="alarme">Alarme</label>
                        </li>
                    </ul>
                  </div>
                   <div class="caixaopcional">
                       <ul class="listaopcionais">
                             <li>
                                   <input type="checkbox" name="opcional[]" id="assistente-pista" value="assistente-pista">
                                <label for="assistente-pista">assitente pista</label>
                             </li>
                             <li>
                                 <input type="checkbox" name="opcional[]" id="partidasemchave" value="partidasemchave">
                                <label for="partidasemchave">Partida sem chave</label>
                             </li>
                             <li>
                                 <input type="checkbox" name="opcional[]" id="smartphone" value="smartphone">
                                <label for="smartphone">Integração com celular</label>
                             </li>
                             <li>
                                 <input type="checkbox" name="opcional[]" id="" value="assistente-pista">
                                <label for="assistente-pista">assitente pista</label>
                             </li>
                             <li>
                                <input type="checkbox" name="opcional[]" id="banco-couro" value="banco-couro">
                                <label for="banco-couro">Banco de couro</label>
                             </li>
                       </ul>
                   </div>
                   <div class="caixaInputs">
                    <p>Fotos de carro <span class="campo-obrigatorio">*</span></p>
                    <input type="file" name="imagem" id="imagem" multiple accept="imagem/png, imagem/jpg" required>
                   </div>
                    <input type="submit" value="enviar" class="btn-submit">
                </form>
                  <hr>
                  <h2>Carros cadastrados</h2>
                  <div id="listarCarros"></div>
                   
            </div>
        </div>
    <script src="script/script.js"></script>

</body>

</html>
